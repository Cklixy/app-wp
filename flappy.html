    <!DOCTYPE html>
<html lang="es"> 
  <head> 
    <meta charset="UTF-8" />
    <title>Flappy Bird - Juego</title>
    <link rel="stylesheet" href="flappy.css" />
  </head>
  <body>
    <div id="game-area">
      <div id="score">Puntuación: 0</div>
      <div id="bestScore">Mejor Puntuación: 0</div>
      <canvas id="gameCanvas" width="400" height="600"></canvas>
      <div id="gameOver">
        <p>¡Juego Terminado!</p>
        <p>Haz clic para reiniciar</p>
        <button id="restartBtn">Reiniciar</button>
      </div>
    </div>
    <audio id="dieSound" src="dead.mp3" preload="auto"></audio>
    <audio id="bgMusic" src="bg.mp3" preload="auto" loop></audio>
    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreElement = document.getElementById('score');
      const gameOverElement = document.getElementById('gameOver');
      const restartBtn = document.getElementById('restartBtn');
      const dieSound = document.getElementById('dieSound');
      const bgMusic = document.getElementById('bgMusic');

      let bird = { x: 60, y: 300, w: 28, h: 20, velocity: 0, gravity: 0.25, jump: -4.6 };
      let pipes = [];
      let score = 0;
      let bestScore = parseInt(localStorage.getItem('flappyBestScore')) || 0;
      let gameRunning = true;
      let soundPlayed = false;

      const bestScoreElement = document.getElementById('bestScore');
      bestScoreElement.textContent = 'Mejor Puntuación: ' + bestScore;

      function drawBird() {
        ctx.fillStyle = '#ffeb3b';
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
        ctx.strokeStyle = '#ef6c00';
        ctx.strokeRect(bird.x, bird.y, bird.w, bird.h);
      }

      function drawPipes() {
        ctx.fillStyle = '#2e7d32';
        pipes.forEach((pipe) => {
          ctx.fillRect(pipe.x, 0, 50, pipe.top);
          ctx.fillRect(pipe.x, pipe.bottom, 50, canvas.height - pipe.bottom);
          ctx.fillStyle = '#1b5e20';
          ctx.fillRect(pipe.x, pipe.top - 20, 50, 20);
          ctx.fillRect(pipe.x, pipe.bottom, 50, 20);
          ctx.fillStyle = '#2e7d32';
        });
      }

      function updateBird() {
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
      }

      function addPipe() {
        const gap = 150;
        const minTop = 60;
        const maxTop = canvas.height - gap - 60;
        const top = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
        pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
      }

      function updatePipes() {
        if (pipes.length === 0 || pipes[pipes.length - 1].x < 220) {
          addPipe();
        }

        pipes.forEach((pipe, index) => {
          pipe.x -= 2.5;

          if (!pipe.passed && pipe.x + 50 < bird.x) {
            pipe.passed = true;
            score++;
            scoreElement.textContent = 'Puntuación: ' + score;
          }

          if (pipe.x + 50 < 0) {
            pipes.splice(index, 1);
          }
        });
      }

      function endGame() {
        if (!gameRunning) return;
        gameRunning = false;
        bird.velocity = 0;

        // Pausar el fondo cuando mueres
        if (!bgMusic.paused) {
          bgMusic.pause();
          bgMusic.currentTime = 0;
        }

        if (!soundPlayed) {
          dieSound.play().catch(() => {});
          soundPlayed = true;
        }

        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('flappyBestScore', bestScore);
          bestScoreElement.textContent = 'Mejor Puntuación: ' + bestScore;
        }

        gameOverElement.style.display = 'block';
      }

      function checkCollision() {
        if (bird.y + bird.h > canvas.height || bird.y < 0) {
          endGame();
          return;
        }

        pipes.forEach((pipe) => {
          if (bird.x < pipe.x + 50 && bird.x + bird.w > pipe.x) {
            if (bird.y < pipe.top || bird.y + bird.h > pipe.bottom) {
              endGame();
            }
          }
        });
      }

      function gameLoop() {
        if (!gameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateBird();
        updatePipes();
        checkCollision();
        drawBird();
        drawPipes();

        requestAnimationFrame(gameLoop);
      }

      function restartGame() {
        bird.y = 300;
        bird.velocity = 0;
        pipes = [];
        score = 0;
        soundPlayed = false;
        scoreElement.textContent = 'Puntuación: 0';
        gameOverElement.style.display = 'none';
        gameRunning = true;
        gameLoop();
      }

      function ensureMusicPlays() {
        if (bgMusic.paused) {
          bgMusic.volume = 0.3;
          bgMusic.play().catch(() => {});
        }
      }

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          ensureMusicPlays();
          if (!gameRunning) {
            restartGame();
          } else {
            bird.velocity = bird.jump;
          }
        }
      });

      canvas.addEventListener('click', () => {
        ensureMusicPlays();
        if (!gameRunning) {
          restartGame();
        } else {
          bird.velocity = bird.jump;
        }
      });

      restartBtn.addEventListener('click', () => {
        ensureMusicPlays();
        restartGame();
      });

      gameLoop();
    </script>
    </script>
  </body>
</html>
